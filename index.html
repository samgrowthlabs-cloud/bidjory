<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

<body>
    <header class="header" id="header">
        <div class="container header-inner">
            <a href="/" class="logo">
                <span class="logo-mark">B</span>
                <span class="logo-text">Bidjory</span>
            </a>
            <nav class="nav" id="nav">
                <ul class="nav-list">

                    <li><a href="/contato/" class="nav-link">Contato</a></li>
                </ul>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>

    <main>
        <section class="hero">
            <div class="container">

                    <p class="hero-overline reveal">Marca pessoal</p>
                    <h1 class="hero-title reveal">Bidjory</h1>

                    <div class="hero-actions reveal">
                        <a href="/projetos/" class="btn btn-primary">

                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                <path d="M3 8h10M10 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </a>
                        <a href="/sobre/" class="btn btn-outline">Sobre</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <span>&copy; <span id="year"></span> Bidjory</span>
